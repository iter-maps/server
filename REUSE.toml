version = 1

# REUSE (https://reuse.software) spec 3.x license/copyright declarations for the
# iter-maps/server repository. This is the multi-license repo's auditability
# backbone: AGPL-3.0 code + CC-BY-4.0 docs (concept 29 §6.2). Full license texts
# live under LICENSES/ named by their SPDX identifier. These [[annotations]]
# blocks declare licensing for files that do not carry an inline SPDX header.

# --- Code: strong copyleft (AGPL-3.0-or-later) -----------------------------
[[annotations]]
path = [
  "crates/**",
  "regions/**",
  "Cargo.toml",
  "**/Cargo.toml",
  "Cargo.lock",
  "rust-toolchain.toml",
  ".env.example",
  ".gitignore",
  ".dockerignore",
  "docker/**",
  "compose*.yaml",
  ".github/**",
  "deny.toml",
  "_typos.toml",
  ".hadolint.yaml",
]
SPDX-FileCopyrightText = "Iter Maps contributors"
SPDX-License-Identifier = "AGPL-3.0-or-later"

# --- Docs & governance: CC-BY-4.0 ------------------------------------------
[[annotations]]
path = [
  "docs/**",
  "README.md",
  "*.md",
]
SPDX-FileCopyrightText = "Iter Maps contributors"
SPDX-License-Identifier = "CC-BY-4.0"
