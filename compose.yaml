# Iter Maps server — "clone + up" stack.
#
#   cp .env.example .env
#   podman compose up            # Rust services (gateway + worker + one-shot pipeline)
#   podman compose --profile engines up   # + OTP routing and Photon geocoding
#
# The base file exposes NO host ports (P3 — an external proxy joins iter-net and
# terminates TLS). `compose.dev.yaml` publishes ports for LAN/dev.

name: iter-maps-server

services:
  # One-shot data-prep. Today it writes health.json; the engine-orchestration
  # steps (graph/index/tiles builds) land next (docs/roadmap). Exits 0.
  pipeline:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: pipeline
    image: ghcr.io/iter-maps/server-pipeline:dev
    env_file:
      - path: .env
        required: false
    volumes:
      - iter-data:/data
    networks: [iter-net]
    restart: "no"

  # Stateless edge / BFF. Scales wide. Reads the artifact tree read-only.
  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: gateway
    image: ghcr.io/iter-maps/server-gateway:dev
    env_file:
      - path: .env
        required: false
    depends_on:
      pipeline:
        condition: service_completed_successfully
    volumes:
      - iter-data:/data:ro
    networks: [iter-net]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8090/livez"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # Background jobs (FL-GTFS build; planned RT polling, reliability rollups).
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: worker
    image: ghcr.io/iter-maps/server-worker:dev
    env_file:
      - path: .env
        required: false
    depends_on:
      pipeline:
        condition: service_completed_successfully
    volumes:
      - iter-data:/data
    networks: [iter-net]
    restart: unless-stopped

  # ── External engines (opt-in: `--profile engines`) ──────────────────────────
  # They require pipeline-built artifacts (routing graph, geocoding index) that
  # land with the engine-orchestration steps (docs/roadmap). Topology is wired
  # so the gateway reaches them by service name (OTP_URL / PHOTON_URL).
  otp:
    image: docker.io/opentripplanner/opentripplanner:2.7.0
    profiles: [engines]
    command: ["--load", "--serve", "/var/opentripplanner"]
    volumes:
      - iter-data:/var/opentripplanner
    networks: [iter-net]
    restart: unless-stopped

  photon:
    # Image/setup per docs/roadmap (Italy needs a locally-built Photon index).
    image: ghcr.io/iter-maps/photon:dev
    profiles: [engines]
    volumes:
      - iter-data:/photon/photon_data
    networks: [iter-net]
    restart: unless-stopped

volumes:
  iter-data:

networks:
  iter-net:
    driver: bridge
