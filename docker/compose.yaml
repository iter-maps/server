# Iter Maps server — "clone + up" stack.
#
#   cp .env.example .env
#   podman compose up            # Rust services (gateway + worker + one-shot pipeline)
#   podman compose --profile engines up   # + OTP routing and Photon geocoding
#
# The base file exposes NO host ports (P3 — an external proxy joins iter-net and
# terminates TLS). `compose.dev.yaml` publishes ports for LAN/dev.

name: iter-maps-server

services:
  # One-shot data-prep. Today it writes health.json; the engine-orchestration
  # steps (graph/index/tiles builds) land next (docs/roadmap). Exits 0.
  pipeline:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: pipeline
    image: ghcr.io/iter-maps/server-pipeline:dev
    env_file:
      - path: ../.env
        required: false
    volumes:
      - iter-data:/data
    networks: [iter-net]
    restart: "no"

  # Stateless edge / BFF. Scales wide. Reads the artifact tree read-only.
  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: gateway
    image: ghcr.io/iter-maps/server-gateway:dev
    env_file:
      - path: ../.env
        required: false
    depends_on:
      pipeline:
        condition: service_completed_successfully
    volumes:
      - iter-data:/data:ro
    networks: [iter-net]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8090/livez"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # Background jobs (FL-GTFS build; planned RT polling, reliability rollups).
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: worker
    image: ghcr.io/iter-maps/server-worker:dev
    env_file:
      - path: ../.env
        required: false
    depends_on:
      pipeline:
        condition: service_completed_successfully
    volumes:
      - iter-data:/data
    networks: [iter-net]
    restart: unless-stopped

  # ── External engines (opt-in: `--profile engines`) ──────────────────────────
  # The gateway reaches them by service name (OTP_URL / PHOTON_URL). OTP loads
  # the graph the pipeline builds at `/data/graph`; Photon still needs a
  # locally-built index (docs/roadmap).
  otp:
    image: docker.io/opentripplanner/opentripplanner:2.7.0
    profiles: [engines]
    depends_on:
      pipeline:
        condition: service_completed_successfully
    # The stock image's entrypoint hardcodes /var/opentripplanner as the graph
    # directory; we reuse its jib invocation but point OTP at the pipeline's
    # /data/graph instead, then load + serve it. OTP reads both build-config.json
    # and router-config.json from that dir, so serving picks up the pipeline's
    # GTFS-RT updaters (router-config.json) for live routing with no extra flag.
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - 'exec java $JAVA_OPTS -cp @/app/jib-classpath-file @/app/jib-main-class-file /data/graph --load --serve'
    environment:
      JAVA_OPTS: "-Xmx${OTP_HEAP:-4g}"
    volumes:
      - iter-data:/data:ro
    networks: [iter-net]
    restart: unless-stopped

  photon:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: photon
    image: ghcr.io/iter-maps/server-photon:dev
    profiles: [engines]
    depends_on:
      pipeline:
        condition: service_completed_successfully
    command: ["serve", "-data-dir", "/data/photon", "-listen-ip", "0.0.0.0"]
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx${PHOTON_HEAP:-1g}"
    # read-WRITE: embedded OpenSearch writes lock/translog files even in serve
    # mode, so a read-only mount fails to start.
    volumes:
      - iter-data:/data
    networks: [iter-net]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:2322/status"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s
    restart: unless-stopped

volumes:
  iter-data:

networks:
  iter-net:
    driver: bridge
