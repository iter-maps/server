name = "Rome"

# House-number (civici) extraction extent ≈ comune di Roma + belt.
[civici]
bbox = "12.10,41.60,12.95,42.20"

# Roma urban network: ATAC (metro A/B/B1/C, tram, bus) — the only feed with a
# public GTFS-RT stream.
[[feeds]]
id = "ATAC"
url = "https://romamobilita.it/wp-content/uploads/shared/rome_static_gtfs.zip"
license = "CC-BY-3.0"
realtime = ["trip-updates", "vehicle-positions", "service-alerts"]

# Server-generated overlays the client draws over the map.
[[overlays]]
kind = "metro-stations"

[[overlays]]
kind = "transit-lines"
lines = ["MEA", "MEB", "MEB1", "MEC", "2", "3", "5", "8", "14", "19"]
