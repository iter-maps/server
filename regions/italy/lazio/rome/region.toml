name = "Rome"

# House-number (civici) extraction extent ≈ comune di Roma + belt.
[civici]
bbox = "12.10,41.60,12.95,42.20"

# Roma urban network: ATAC (metro A/B/B1/C, tram, bus) — the only feed with a
# public GTFS-RT stream.
[[feeds]]
id = "ATAC"
url = "https://romamobilita.it/wp-content/uploads/shared/rome_static_gtfs.zip"
license = "CC-BY-3.0"

# GTFS-RT channels. Only trip-updates is consumed today (reliability ingestion);
# the other two are declared for when their jobs land.
[[feeds.realtime]]
channel = "trip-updates"
url = "https://romamobilita.it/wp-content/uploads/shared/rome_rtgtfs_trip_updates_feed.pb"

[[feeds.realtime]]
channel = "vehicle-positions"

[[feeds.realtime]]
channel = "service-alerts"

# Server-generated overlays the client draws over the map.
[[overlays]]
kind = "metro-stations"

[[overlays]]
kind = "transit-lines"
lines = ["MEA", "MEB", "MEB1", "MEC", "2", "3", "5", "8", "14", "19"]
