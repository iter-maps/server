<svg viewBox="0 0 900 492" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
<title>Iter Maps roadmap</title>
<desc>Features grouped into available now, in progress, and planned.</desc>
<rect x="1" y="1" width="898" height="490" rx="22" fill="#16161D" stroke="#2A2A36" stroke-width="1.5"/>
<text x="40" y="56" font-size="30" font-weight="600" fill="#8E93F5">roadmap</text>
<text x="40" y="82" font-size="15" fill="#9A9AAB">what's live, and what's on the way.</text>
<line x1="40" y1="102" x2="860" y2="102" stroke="#2A2A36" stroke-width="1.5"/>
<circle cx="48" cy="134" r="5" fill="#7C82F0"/>
<text x="62" y="139" font-size="16" font-weight="600" fill="#ECECF3">Available now</text>
<circle cx="328" cy="134" r="5" fill="none" stroke="#7C82F0" stroke-width="2.4"/>
<text x="342" y="139" font-size="16" font-weight="600" fill="#ECECF3">In progress</text>
<circle cx="608" cy="134" r="5" fill="#52525F"/>
<text x="622" y="139" font-size="16" font-weight="600" fill="#ECECF3">Planned</text>
<g>
<rect x="40" y="158" width="260" height="42" rx="12" fill="#23233A"/><text x="58" y="184" font-size="15" font-weight="500" fill="#C8CBF5">Journey planning</text>
<rect x="40" y="211" width="260" height="42" rx="12" fill="#23233A"/><text x="58" y="237" font-size="15" font-weight="500" fill="#C8CBF5">Search &amp; places</text>
<rect x="40" y="264" width="260" height="42" rx="12" fill="#23233A"/><text x="58" y="290" font-size="15" font-weight="500" fill="#C8CBF5">Maps &amp; transit overlays</text>
<rect x="40" y="317" width="260" height="42" rx="12" fill="#23233A"/><text x="58" y="343" font-size="15" font-weight="500" fill="#C8CBF5">Offline maps</text>
<rect x="40" y="370" width="260" height="42" rx="12" fill="#23233A"/><text x="58" y="396" font-size="15" font-weight="500" fill="#C8CBF5">Live arrivals &amp; delays</text>
<rect x="40" y="423" width="260" height="42" rx="12" fill="#23233A"/><text x="58" y="449" font-size="15" font-weight="500" fill="#C8CBF5">Live train boards</text>
</g>
<g>
<rect x="320" y="158" width="260" height="42" rx="12" fill="#16161D" stroke="#7C82F0" stroke-width="1.5"/><text x="338" y="184" font-size="15" font-weight="500" fill="#B9BCF7">On-time reliability</text>
<rect x="320" y="211" width="260" height="42" rx="12" fill="#16161D" stroke="#7C82F0" stroke-width="1.5"/><text x="338" y="237" font-size="15" font-weight="500" fill="#B9BCF7">Daily-fresh schedules</text>
</g>
<g>
<rect x="600" y="158" width="260" height="42" rx="12" fill="#16161D" stroke="#34343F" stroke-width="1.5"/><text x="618" y="184" font-size="15" font-weight="500" fill="#9A9AAB">Personalized routes</text>
<rect x="600" y="211" width="260" height="42" rx="12" fill="#16161D" stroke="#34343F" stroke-width="1.5"/><text x="618" y="237" font-size="15" font-weight="500" fill="#9A9AAB">Private sync across devices</text>
<rect x="600" y="264" width="260" height="42" rx="12" fill="#16161D" stroke="#34343F" stroke-width="1.5"/><text x="618" y="290" font-size="15" font-weight="500" fill="#9A9AAB">Crowding</text>
<rect x="600" y="317" width="260" height="42" rx="12" fill="#16161D" stroke="#34343F" stroke-width="1.5"/><text x="618" y="343" font-size="15" font-weight="500" fill="#9A9AAB">Europe-wide coverage</text>
<rect x="600" y="370" width="260" height="42" rx="12" fill="#16161D" stroke="#34343F" stroke-width="1.5"/><text x="618" y="396" font-size="15" font-weight="500" fill="#9A9AAB">Traffic</text>
</g>
