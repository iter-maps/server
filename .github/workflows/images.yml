# Build, publish, and sign the service images to GHCR.
#
# Dormant by design: runs only on a release tag (v*) or manual dispatch — not on
# every push. Only code images are published; data artifacts stay generated on
# the host (P7). Images are signed keyless with cosign (Sigstore) because they
# run on other people's public-facing servers.

name: images

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write # cosign keyless (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bin: [gateway, pipeline, worker]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/server-${{ matrix.bin }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: ${{ matrix.bin }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true

      - uses: sigstore/cosign-installer@v3

      - name: Sign the published image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          for tag in $TAGS; do
            cosign sign --yes "${tag%:*}@${DIGEST}"
          done
